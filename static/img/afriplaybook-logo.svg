      <line class="book-line" x1="12" y1="32" x2="34" y2="29"/>
      <line class="book-line" x1="52" y1="13" x2="76" y2="16"/>
      <line class="book-line" x1="52" y1="21" x2="76" y2="24"/>
      <line class="book-line" x1="54" y1="29" x2="76" y2="32"/>
    </g>
