<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 560" width="1760" height="560">
  <defs>
    <style>
      .bark-dark   { fill: #6e3617; }
      .bark-light  { fill: #a85a2b; }
      .leaf-dgreen { fill: #415b2c; }
      .leaf-mgreen { fill: #5c7a39; }
      .leaf-orange { fill: #bd6a30; }
      .leaf-gold   { fill: #cf9a2c; }
      .frame       { fill: none; stroke: #2f5d3a; stroke-width: 13; stroke-linecap: butt; }
      .book-cover  { fill: #a8512a; }
      .book-spine  { fill: #6e3617; }
      .book-page   { fill: #f4efe6; }
      .book-line   { stroke: #6e3617; stroke-width: 3; opacity: .55; }
      .wm          { font-family: 'Arial Rounded MT Bold', 'Helvetica Neue', Helvetica, Arial, sans-serif;
                     font-size: 196px; font-weight: 800; letter-spacing: -5px; }
      .wm-afri     { fill: #bd6a30; }
      .wm-play     { fill: #3f5e2e; }
    </style>
  </defs>

  <!-- ============================= ICON ============================= -->
  <g transform="translate(10, 28) scale(0.84)">
