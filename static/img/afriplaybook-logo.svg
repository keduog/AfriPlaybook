    <circle class="leaf-mgreen" cx="244" cy="100" r="30"/>
    <circle class="leaf-dgreen" cx="182" cy="122" r="29"/>
    <circle class="leaf-mgreen" cx="420" cy="110" r="27"/>
    <circle class="leaf-dgreen" cx="474" cy="142" r="31"/>
    <circle class="leaf-orange" cx="300" cy="135" r="20"/>
    <circle class="leaf-orange" cx="112" cy="178" r="30"/>
    <circle class="leaf-mgreen" cx="152" cy="216" r="34"/>
    <circle class="leaf-dgreen" cx="92"  cy="232" r="26"/>
    <circle class="leaf-orange" cx="200" cy="180" r="23"/>
    <circle class="leaf-mgreen" cx="252" cy="158" r="22"/>
    <circle class="leaf-mgreen" cx="490" cy="202" r="30"/>
    <circle class="leaf-orange" cx="448" cy="238" r="33"/>
    <circle class="leaf-dgreen" cx="524" cy="244" r="24"/>
    <circle class="leaf-mgreen" cx="400" cy="180" r="22"/>
    <circle class="leaf-dgreen" cx="338" cy="150" r="20"/>
    <circle class="leaf-orange" cx="300" cy="248" r="20"/>
    <circle class="leaf-dgreen" cx="214" cy="292" r="15"/>
    <circle class="leaf-orange" cx="138" cy="300" r="17"/>
    <circle class="leaf-gold"   cx="172" cy="334" r="12"/>
    <circle class="leaf-mgreen" cx="408" cy="296" r="15"/>
    <circle class="leaf-orange" cx="470" cy="300" r="17"/>
