    <path class="frame" d="M 55 135 L 55 58 L 132 58"/>
    <path class="frame" d="M 545 135 L 545 58 L 468 58"/>
    <path class="frame" d="M 55 465 L 55 542 L 132 542"/>
    <path class="frame" d="M 545 465 L 545 542 L 468 542"/>

    <!-- Side branch reaching LEFT (dark) -->
    <path class="bark-dark" d="M 286 312 C 232 286, 176 286, 132 312 C 156 320, 178 322, 196 322 C 232 322, 262 336, 288 356 Z"/>
    <!-- Side branch reaching RIGHT (light) -->
    <path class="bark-light" d="M 314 322 C 368 294, 426 294, 470 322 C 446 330, 422 332, 404 332 C 368 332, 338 346, 312 366 Z"/>

    <!-- Central upward V branches -->
    <path class="bark-dark" d="M 290 360 C 282 296, 290 232, 314 178 C 322 188, 322 206, 318 224 C 304 274, 308 322, 324 360 Z"/>
    <path class="bark-light" d="M 308 360 C 322 300, 356 248, 402 198 C 410 210, 404 228, 392 248 C 362 296, 338 330, 326 362 Z"/>

